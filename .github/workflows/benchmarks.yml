name: Benchmarks

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions: {}

jobs:
  browser-benchmarks:
    name: Browser benchmarks
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
    env:
      BENCHMARK_ITERATIONS: 10
      BENCHMARK_WARMUP_ITERATIONS: 2
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Find baseline SHA from latest successful main run
        id: baseline
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          baseline_sha=$(
            curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/workflows/benchmarks.yml/runs?branch=main&status=success&event=push&per_page=1" \
            | jq -r '.workflow_runs[0].head_sha // empty'
          )
          echo "sha=$baseline_sha" >> "$GITHUB_OUTPUT"

      - name: Note missing baseline
        if: steps.baseline.outputs.sha == ''
        run: |
          {
            echo "## Browser Benchmark Comparison"
            echo ""
            echo "No successful \`main\` benchmark run exists yet, so this run only produced a current-side benchmark."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: "yarn"

      - name: Check out baseline commit
        if: steps.baseline.outputs.sha != ''
        env:
          BASELINE_SHA: ${{ steps.baseline.outputs.sha }}
        run: git checkout --detach "$BASELINE_SHA"

      - name: Install baseline dependencies
        if: steps.baseline.outputs.sha != ''
        run: yarn install --frozen-lockfile

      - name: Install Playwright Chromium (baseline)
        if: steps.baseline.outputs.sha != ''
        run: npx playwright install --with-deps chromium

      - name: Run browser benchmarks (baseline)
        if: steps.baseline.outputs.sha != ''
        run: |
          yarn benchmark:browser --output tmp/baseline-benchmarks.json
          echo "=== baseline benchmark JSON ==="
          cat tmp/baseline-benchmarks.json

      - name: Check out current commit
        run: git checkout --detach "$GITHUB_SHA"

      - name: Install current dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright Chromium (current)
        run: npx playwright install --with-deps chromium

      - name: Run browser benchmarks (current)
        run: |
          yarn benchmark:browser --output tmp/current-benchmarks.json
          echo "=== current benchmark JSON ==="
          cat tmp/current-benchmarks.json

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: browser-benchmarks
          path: |
            tmp/baseline-benchmarks.json
            tmp/current-benchmarks.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Compare benchmark medians
        if: steps.baseline.outputs.sha != ''
        run: yarn benchmark:browser:compare tmp/baseline-benchmarks.json tmp/current-benchmarks.json
