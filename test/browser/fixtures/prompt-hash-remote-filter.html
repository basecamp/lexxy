<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Lexxy Test — Hash Prompt Remote Filter</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <form>
    <div class="body">
      <lexxy-editor class="lexxy-content" placeholder="Write something...">
        <lexxy-prompt trigger="#" name="card" src="/prompt-items" remote-filtering supports-space-in-searches>
        </lexxy-prompt>
      </lexxy-editor>
    </div>

    <div class="events"></div>
  </form>

  <script type="module" src="/editor.js"></script>
</body>
</html>
