<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon.png">
  <title>{% if page.title and page.title != "Home" %}{{ page.title }} · {% endif %}{{ site.title }} — {{ site.description }}</title>
  {% seo %}
  <link rel="stylesheet" href="{{ "/assets/landing.css" | relative_url }}">
  {% if page.editor %}
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@37signals/lexxy@latest/dist/stylesheets/lexxy.css">
  <script type="module">
    import * as Lexxy from "https://cdn.jsdelivr.net/npm/@37signals/lexxy@latest/+esm";
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("{{ site.baseurl }}/attachments-sw.js");
    }
  </script>
  {% endif %}
</head>
<body class="landing">
  <header class="site-header">
    <div class="container">
      <a class="site-header__brand" href="{{ "/" | relative_url }}" aria-label="Lexxy home">

          <defs>
            <mask id="logo-swipe-mask" maskUnits="userSpaceOnUse">
              <rect class="logo__select-mask" x="109" y="0" width="0" height="80" fill="white" />

          <path class="logo__xy" d="m156 50.3 8-24.8h6L158.5 59q-1.2 3.4-2.4 5.4a6 6 0 0 1-3.2 2.8q-2.1.9-5.7.9h-2.8v-4.8h2.2q2.4 0 3.6-.4t2-1.6 1.4-3.6L142 25.5h6zm-30.6-13.7 8-11.2h6.5l-11.2 15.7 11.8 16.5H134l-8.6-12-8.6 12h-6.4l11.8-16.5L111 25.4h6.4z"/>

        </svg>
      </a>
      <nav class="site-header__nav">
        <a href="{{ "/docs/" | relative_url }}">Docs</a>
        <a href="{{ "/sandbox/" | relative_url }}">Sandbox</a>
        <a href="https://github.com/basecamp/lexxy">GitHub</a>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>
</body>
</html>
